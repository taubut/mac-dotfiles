after-login-command = []
after-startup-command = []

# Notify SketchyBar of workspace changes
exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

start-at-login = true

# Normalizations
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse
on-focus-changed = ['move-mouse window-lazy-center']

# Gaps
[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 8
outer.bottom = 8
outer.top = 14
outer.right = 8

# Main binding mode
[mode.main.binding]
alt-enter = 'exec-and-forget open -na Ghostty'
alt-b = 'exec-and-forget open -a qutebrowser'

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Layout
alt-f = 'fullscreen'
alt-shift-f = 'exec-and-forget open -a Finder'
alt-shift-space = 'layout floating tiling'
alt-e = 'split opposite'
ctrl-alt-cmd-g = ['flatten-workspace-tree', 'balance-sizes']

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'

# Move to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'

# Float exceptions
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.archiveutility'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.AppStore'
run = 'layout floating'
